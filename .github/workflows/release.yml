name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Package and publish
    runs-on: ubuntu-latest
    environment: production-release
    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        run: rustup toolchain install 1.94 --profile minimal --component clippy,rustfmt

      - name: Use Rust toolchain
        run: rustup default 1.94

      - name: Validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must be a semantic version prefixed with v: ${tag}" >&2
            exit 1
          fi

          version="$(
            cargo metadata --no-deps --format-version 1 |
              python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])'
          )"
          if [[ "${tag}" != "v${version}" ]]; then
            echo "Tag ${tag} does not match Cargo package version ${version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Require public release source
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          visibility="$(gh repo view "${GITHUB_REPOSITORY}" --json visibility --jq .visibility)"
          if [[ "${visibility}" != "PUBLIC" ]]; then
            echo "Homebrew releases require ${GITHUB_REPOSITORY} to be public; current visibility is ${visibility}" >&2
            exit 1
          fi

      - name: Run release checks
        run: |
          cargo fmt --check
          cargo clippy --locked --all-targets --all-features -- -D warnings
          cargo test --locked

      - name: Package source archive
        id: package
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          cargo package --locked
          archive="target/package/rustgrid-agent-${VERSION}.crate"
          checksum="$(sha256sum "${archive}" | awk '{print $1}')"
          checksum_file="${archive}.sha256"
          printf '%s  %s\n' "${checksum}" "$(basename "${archive}")" > "${checksum_file}"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"
          echo "checksum=${checksum}" >> "${GITHUB_OUTPUT}"
          echo "checksum_file=${checksum_file}" >> "${GITHUB_OUTPUT}"

      - name: Generate Homebrew formula
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        run: |
          set -euo pipefail
          sed \
            -e "s/@VERSION@/${VERSION}/g" \
            -e "s/@SHA256@/${CHECKSUM}/g" \
            packaging/homebrew/rustgrid-agent.rb.in \
            > target/package/rustgrid-agent.rb
          if grep -Eq '@(VERSION|SHA256)@' target/package/rustgrid-agent.rb; then
            echo "Homebrew formula still contains an unresolved placeholder" >&2
            exit 1
          fi

      - name: Generate release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          file: ${{ steps.package.outputs.archive }}
          output-file: target/package/rustgrid-agent.spdx.json
          format: spdx-json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest release package provenance and SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ steps.package.outputs.archive }}
          sbom-path: target/package/rustgrid-agent.spdx.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
          CHECKSUM_FILE: ${{ steps.package.outputs.checksum_file }}
          SBOM: target/package/rustgrid-agent.spdx.json
          RELEASE_NOTES: docs/releases/${{ github.ref_name }}.md
        run: |
          test -f "${RELEASE_NOTES}"
          gh release create "${GITHUB_REF_NAME}" \
            "${ARCHIVE}" \
            "${CHECKSUM_FILE}#SHA-256 checksum" \
            "${SBOM}#SPDX JSON SBOM" \
            "target/package/rustgrid-agent.rb#Homebrew formula" \
            --verify-tag \
            --notes-file "${RELEASE_NOTES}" \
            --title "rustgrid-agent ${GITHUB_REF_NAME}"

  binaries:
    name: Native binary (${{ matrix.name }})
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - {name: linux-x86_64, os: ubuntu-latest}
          - {name: macos-native, os: macos-latest}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        run: rustup toolchain install 1.94 --profile minimal

      - name: Build locked release binary
        run: cargo build --locked --release

      - name: Archive and install-test binary
        id: archive
        shell: bash
        env:
          NAME: ${{ matrix.name }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="rustgrid-agent-${version}-${NAME}.tar.gz"
          staging="$(mktemp -d)"
          install -m 0755 target/release/rustgrid-agent "${staging}/rustgrid-agent"
          tar -C "${staging}" -czf "${archive}" rustgrid-agent
          extracted="$(mktemp -d)"
          tar -C "${extracted}" -xzf "${archive}"
          "${extracted}/rustgrid-agent" --version | grep -F "${version}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive}" > "${archive}.sha256"
          else
            shasum -a 256 "${archive}" > "${archive}.sha256"
          fi
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Attest native binary archive
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ steps.archive.outputs.archive }}

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE: ${{ steps.archive.outputs.archive }}
        run: gh release upload "${GITHUB_REF_NAME}" "${ARCHIVE}" "${ARCHIVE}.sha256"

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    environment: production-release
    permissions:
      contents: read
    steps:
      - name: Check out Homebrew tap
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: RustGrid/homebrew-tap
          ref: main
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download generated formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern rustgrid-agent.rb \
            --dir /tmp

      - name: Validate formula
        run: ruby -c /tmp/rustgrid-agent.rb

      - name: Publish formula
        working-directory: homebrew-tap
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Formula
          cp /tmp/rustgrid-agent.rb Formula/rustgrid-agent.rb
          if git diff --quiet -- Formula/rustgrid-agent.rb; then
            echo "Homebrew formula already matches ${GITHUB_REF_NAME}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/rustgrid-agent.rb
          git commit -m "rustgrid-agent ${GITHUB_REF_NAME}"
          git push origin HEAD:main

  container:
    name: Build and publish release container
    needs: release
    runs-on: ubuntu-latest
    environment: production-release
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Require reviewed Codex version
        env:
          CODEX_VERSION: ${{ vars.CODEX_VERSION }}
          NPM_VERSION: ${{ vars.NPM_VERSION }}
          RUST_BUILDER_IMAGE: ${{ vars.RUST_BUILDER_IMAGE }}
          NODE_RUNTIME_IMAGE: ${{ vars.NODE_RUNTIME_IMAGE }}
        run: |
          test -n "${CODEX_VERSION}"
          test -n "${NPM_VERSION}"
          test -n "${RUST_BUILDER_IMAGE}"
          test -n "${NODE_RUNTIME_IMAGE}"
          [[ "${RUST_BUILDER_IMAGE}" == *@sha256:* ]]
          [[ "${NODE_RUNTIME_IMAGE}" == *@sha256:* ]]

      - name: Log in to GitHub Container Registry
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "${GH_TOKEN}" | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Build and smoke-test image
        id: local-image
        env:
          CODEX_VERSION: ${{ vars.CODEX_VERSION }}
          NPM_VERSION: ${{ vars.NPM_VERSION }}
          RUST_BUILDER_IMAGE: ${{ vars.RUST_BUILDER_IMAGE }}
          NODE_RUNTIME_IMAGE: ${{ vars.NODE_RUNTIME_IMAGE }}
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/rustgrid-agent:${GITHUB_REF_NAME}"
          docker build \
            --build-arg "CODEX_VERSION=${CODEX_VERSION}" \
            --build-arg "NPM_VERSION=${NPM_VERSION}" \
            --build-arg "RUST_BUILDER_IMAGE=${RUST_BUILDER_IMAGE}" \
            --build-arg "NODE_RUNTIME_IMAGE=${NODE_RUNTIME_IMAGE}" \
            --tag "${image}" .
          docker run --rm --entrypoint rustgrid-agent "${image}" --version | grep -F "${GITHUB_REF_NAME#v}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Report all container vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.local-image.outputs.image }}
          fail-build: false
          severity-cutoff: high
          output-format: table
          grype-version: 0.100.0
          cache-db: true

      - name: Block fixable high-severity vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.local-image.outputs.image }}
          fail-build: true
          severity-cutoff: high
          output-format: table
          only-fixed: true
          grype-version: 0.100.0
          cache-db: true

      - name: Push image and resolve digest
        id: image
        env:
          IMAGE: ${{ steps.local-image.outputs.image }}
        shell: bash
        run: |
          set -euo pipefail
          image="${IMAGE}"
          docker push "${image}"
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "${image}" | cut -d@ -f2)"
          test -n "${digest}"
          echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/rustgrid-agent" >> "${GITHUB_OUTPUT}"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: Attest container provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
