name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-safety:
    name: Repository safety and container build
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Scan tracked files for credential patterns
        run: bash scripts/check-secrets.sh

      - name: Build the locked Rust container stage
        run: docker build --target builder --tag rustgrid-agent-builder:${{ github.sha }} .

      - name: Validate generated Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          sed -e 's/@VERSION@/1.0.0/g' -e "s/@SHA256@/$(printf '0%.0s' {1..64})/g" \
            packaging/homebrew/rustgrid-agent.rb.in > /tmp/rustgrid-agent.rb
          ruby -c /tmp/rustgrid-agent.rb

      - name: Validate deployment manifests
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'concurrencyPolicy: Forbid' deploy/kubernetes/worker-cronjob.yaml
          grep -q 'readOnlyRootFilesystem: true' deploy/kubernetes/worker-cronjob.yaml
          grep -q 'watch", "--once' Dockerfile

  quality:
    name: Format, lint, test, and package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        run: rustup toolchain install 1.94 --profile minimal --component clippy,rustfmt

      - name: Use Rust toolchain
        run: rustup default 1.94

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint all targets
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run test suite
        run: cargo test --locked --all-targets --all-features

      - name: Verify release package
        run: cargo package --locked

  dependencies:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Check advisories, licenses, bans, and sources
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2

      - name: Verify required RustGrid worker contracts
        shell: bash
        run: |
          set -euo pipefail
          for path in \
            '/api/v1/agent-runs' \
            '/api/v1/agent-runs/claim-next' \
            '/api/v1/agent-runs/{run_id}/events' \
            '/api/v1/agent-runs/{run_id}/github-token' \
            '/api/v1/agent-runs/{run_id}/lease' \
            '/api/v1/agent-runs/{run_id}/manifest' \
            '/api/v1/agent-workers/{id}/heartbeat' \
            '/api/v1/agent-workers/{id}/queue' \
            '/api/v1/agent-workers/{id}/queue/stream' \
            '/api/v1/agent-workers/{id}/runs'; do
            jq -e --arg path "${path}" '.paths[$path]' openapi.current.json >/dev/null
          done
