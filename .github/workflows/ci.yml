name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-safety:
    name: Repository safety and container build
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Scan tracked files for credential patterns
        run: bash scripts/check-secrets.sh

      - name: Build and smoke-test the pinned release container
        env:
          CODEX_VERSION: 0.144.4
          NPM_VERSION: 12.0.1
          RUST_BUILDER_IMAGE: rust:1.94-bookworm@sha256:6ae102bdbf528294bc79ad6e1fae682f6f7c2a6e6621506ba959f9685b308a55
          NODE_RUNTIME_IMAGE: node:24-trixie-slim@sha256:ae91dcc111a68c9d2d81ff2a17bda61be126426176fde6fe7d08ab13b7f50573
        run: |
          docker build \
            --build-arg "CODEX_VERSION=${CODEX_VERSION}" \
            --build-arg "NPM_VERSION=${NPM_VERSION}" \
            --build-arg "RUST_BUILDER_IMAGE=${RUST_BUILDER_IMAGE}" \
            --build-arg "NODE_RUNTIME_IMAGE=${NODE_RUNTIME_IMAGE}" \
            --tag "rustgrid-agent-ci:${GITHUB_SHA}" .
          docker run --rm --entrypoint rustgrid-agent \
            "rustgrid-agent-ci:${GITHUB_SHA}" --version |
            grep -F "$(cargo metadata --no-deps --format-version 1 |
              python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])')"

      - name: Block fixable high-severity container vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: rustgrid-agent-ci:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: table
          only-fixed: true
          grype-version: v0.100.0
          cache-db: true

      - name: Validate generated Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          version="$(
            cargo metadata --no-deps --format-version 1 |
              python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])'
          )"
          sed -e "s/@VERSION@/${version}/g" -e "s/@SHA256@/$(printf '0%.0s' {1..64})/g" \
            packaging/homebrew/rustgrid-agent.rb.in > /tmp/rustgrid-agent.rb
          ruby -c /tmp/rustgrid-agent.rb

      - name: Validate deployment manifests
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'concurrencyPolicy: Forbid' deploy/kubernetes/worker-cronjob.yaml
          grep -q 'readOnlyRootFilesystem: true' deploy/kubernetes/worker-cronjob.yaml
          grep -q 'watch", "--once' Dockerfile

  quality:
    name: Format, lint, test, and package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        run: rustup toolchain install 1.94 --profile minimal --component clippy,rustfmt

      - name: Use Rust toolchain
        run: rustup default 1.94

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint all targets
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run test suite
        run: cargo test --locked --all-targets --all-features

      - name: Verify release package
        run: cargo package --locked

  dependencies:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check advisories, licenses, bans, and sources
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2

      - name: Verify required RustGrid worker contracts
        shell: bash
        run: |
          set -euo pipefail
          for path in \
            '/api/v1/agent-runs' \
            '/api/v1/agent-runs/claim-next' \
            '/api/v1/agent-runs/{run_id}/events' \
            '/api/v1/agent-runs/{run_id}/github-token' \
            '/api/v1/agent-runs/{run_id}/lease' \
            '/api/v1/agent-runs/{run_id}/manifest' \
            '/api/v1/agent-workers/{id}/heartbeat' \
            '/api/v1/agent-workers/{id}/queue' \
            '/api/v1/agent-workers/{id}/queue/stream' \
            '/api/v1/agent-workers/{id}/runs'; do
            jq -e --arg path "${path}" '.paths[$path]' openapi.current.json >/dev/null
          done
