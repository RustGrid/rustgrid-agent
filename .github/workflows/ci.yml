name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, test, and package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        run: rustup toolchain install 1.85 --profile minimal --component clippy,rustfmt

      - name: Use Rust toolchain
        run: rustup default 1.85

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint all targets
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run test suite
        run: cargo test --locked --all-targets --all-features

      - name: Verify release package
        run: cargo package --locked

  dependencies:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check advisories, licenses, bans, and sources
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2

