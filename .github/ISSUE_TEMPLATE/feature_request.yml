name: Feature request
description: Propose a focused capability or operator improvement
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the operator or user problem, not only the desired implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and compatibility considerations
      description: Consider isolation, credentials, network access, API contracts, and recovery.
