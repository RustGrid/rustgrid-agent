apiVersion: batch/v1
kind: CronJob
metadata:
  name: rustgrid-agent
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 86400
      template:
        metadata:
          labels: {app: rustgrid-agent}
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          terminationGracePeriodSeconds: 86400
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile: {type: RuntimeDefault}
          containers:
            - name: worker
              image: ghcr.io/rustgrid/rustgrid-agent@sha256:REPLACE_WITH_DIGEST
              imagePullPolicy: IfNotPresent
              args: ["--config", "/etc/rustgrid-agent/agent.json", "watch", "--once"]
              env:
                - {name: RUSTGRID_AGENT_LOG, value: json}
                - name: RUSTGRID_WORKER_API_KEY
                  valueFrom:
                    secretKeyRef: {name: rustgrid-agent, key: api-key}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: [ALL]}
              resources:
                requests: {cpu: "1", memory: 2Gi, ephemeral-storage: 2Gi}
                limits: {cpu: "4", memory: 10Gi, ephemeral-storage: 8Gi}
              volumeMounts:
                - {name: config, mountPath: /etc/rustgrid-agent, readOnly: true}
                - {name: workspaces, mountPath: /var/lib/rustgrid-agent/workspaces}
                - {name: codex-home, mountPath: /var/lib/rustgrid-agent/.codex}
                - {name: tmp, mountPath: /tmp}
          volumes:
            - name: config
              configMap: {name: rustgrid-agent}
            - name: workspaces
              emptyDir: {sizeLimit: 8Gi}
            - name: codex-home
              persistentVolumeClaim: {claimName: rustgrid-agent-codex}
            - name: tmp
              emptyDir: {medium: Memory, sizeLimit: 1Gi}
