services:
  rustgrid-agent:
    build:
      context: ..
      args:
        CODEX_VERSION: ${CODEX_VERSION:?set a reviewed Codex version}
    image: rustgrid-agent:${RUSTGRID_AGENT_VERSION:-local}
    init: true
    restart: "no"
    read_only: true
    user: "65532:65532"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 10g
    cpus: 4
    environment:
      RUSTGRID_API_KEY: ${RUSTGRID_API_KEY:?set the worker API key}
      RUSTGRID_API_URL: ${RUSTGRID_API_URL:-https://app.rustgrid.com/api/v1}
      RUSTGRID_AGENT_ISOLATION: per_run
      RUSTGRID_AGENT_LOG: json
    volumes:
      - ./agent.json:/etc/rustgrid-agent/agent.json:ro
      - codex-home:/var/lib/rustgrid-agent/.codex
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=1g
      - /var/lib/rustgrid-agent/workspaces:rw,nosuid,nodev,size=8g

volumes:
  codex-home: {}
